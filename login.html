<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Online Books Library</title>
</head>

<style>
    body{
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .bg{
        background-image: url(/lib_image.jpg);
        background-size: cover;
        position: fixed;
        inset: 0;
        filter: brightness(0.5);
        z-index: -1;
    }

    .login-box{
        margin: 15vh auto;
        width: 350px;
        padding: 30px;
        border: 3px solid #8b5a2b;
        border-radius: 18px;
        background: rgba(45,30,18,0.85);
        color: #f0e6d2;
        text-align: center;
    }

    .login-box h2{
        margin-bottom: 25px;
        text-decoration: underline;
    }

    .login-box input{
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    .login-box button{
        margin-top: 15px;
        padding: 10px 25px;
        border-radius: 10px;
        border: 2px solid #8b5a2b;
        background: rgba(0,0,0,0.5);
        color: #f0e6d2;
        font-weight: 600;
        cursor: pointer;
    }

    .login-box button:hover{
        background: rgba(139,90,43,0.6);
        color: #ffd28a;
    }
</style>

<body>
    <div class="bg"></div>

    <div class="login-box">
        <h2>Login</h2>

        <input type="email" placeholder="Enter Email" required>
        <input type="password" placeholder="Enter Password" required>

        <button>Login</button>
    </div>
</body>
</html>
